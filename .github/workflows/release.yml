name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Build frontend
      run: pnpm run build
      
    - name: Build backend
      run: make -C backend
      
    - name: Create distribution
      run: |
        mkdir -p build/rog-ally-rumble-fixer/bin
        mkdir -p build/rog-ally-rumble-fixer/dist
        
        cp plugin.json build/rog-ally-rumble-fixer/
        cp package.json build/rog-ally-rumble-fixer/
        cp main.py build/rog-ally-rumble-fixer/
        cp README.md build/rog-ally-rumble-fixer/
        cp LICENSE build/rog-ally-rumble-fixer/
        cp -r dist/* build/rog-ally-rumble-fixer/dist/
        cp backend/out/rumble-fixer build/rog-ally-rumble-fixer/bin/
        
    - name: Create zip file
      run: |
        cd build
        zip -r rog-ally-rumble-fixer.zip rog-ally-rumble-fixer
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rog-ally-rumble-fixer
        path: build/rog-ally-rumble-fixer.zip
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/rog-ally-rumble-fixer.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
